<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- viewport-fit=cover exposes safe-area-inset-* for notch/home-indicator handling -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Status bar / theme color -->
    <meta name="theme-color" content="#0b0d12" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HoopsOS" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="format-detection" content="telephone=no" />

    <title>HoopsOS</title>
    <meta name="description" content="Elite basketball operations platform for coaches, athletes, and programs." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet" />

    <script>
      window.__appErrors = [];
      window.onerror = function(msg, src, line, col, err) {
        window.__appErrors.push({msg, src, line, stack: err && err.stack});
        var el = document.getElementById('root');
        if (el && el.children.length === 0) {
          el.style.cssText = 'padding:20px;font-family:monospace;color:#fff;background:#1a1a1a;';
          el.innerHTML = '<h2 style="color:#f87171">App failed to load</h2><pre style="white-space:pre-wrap;font-size:12px;color:#fca5a5">' + msg + '\n' + (err && err.stack || '') + '</pre>';
        }
        return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        window.__appErrors.push({msg: String(e.reason), stack: e.reason && e.reason.stack});
        var el = document.getElementById('root');
        if (el && el.children.length === 0) {
          el.style.cssText = 'padding:20px;font-family:monospace;color:#fff;background:#1a1a1a;';
          el.innerHTML = '<h2 style="color:#f87171">App failed to load (promise)</h2><pre style="white-space:pre-wrap;font-size:12px;color:#fca5a5">' + String(e.reason) + '\n' + (e.reason && e.reason.stack || '') + '</pre>';
        }
      });
    </script>

    <style>
      /* CSS custom properties for safe area insets — consumed in Tailwind via arbitrary values */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      /* Prevent overscroll bounce on iOS WebView and standalone PWA */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        height: 100%;
      }
      #root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
